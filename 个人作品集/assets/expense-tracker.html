<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="记账">
    <meta name="theme-color" content="#4A90E2">
    <meta name="description" content="管理你的每一笔支出">
    <title>每日记账 - Daily Expense Tracker</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='100%' height='100%' fill='%234A90E2' rx='20'/><text x='90' y='120' font-size='90' text-anchor='middle'>💰</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4A90E2;
            --primary-dark: #3A7BC8;
            --success: #50C878;
            --danger: #FF6B6B;
            --bg-main: #F8F9FA;
            --bg-card: #FFFFFF;
            --text-primary: #2C3E50;
            --text-secondary: #7F8C8D;
            --text-light: #95A5A6;
            --border: #E8EAED;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --shadow-hover: 0 4px 20px rgba(0,0,0,0.12);
            --radius: 16px;
            --radius-sm: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-main);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        .app-container {
            max-width: 430px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--bg-main);
            position: relative;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, #6C63FF 100%);
            padding: 24px 20px 40px;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 200px;
            height: 200px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }

        .header::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 150px;
            height: 150px;
            background: rgba(255,255,255,0.08);
            border-radius: 50%;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 4px;
            position: relative;
            z-index: 1;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }

        .page-content {
            padding: 0 16px;
            padding-bottom: 100px;
            margin-top: -20px;
            position: relative;
            z-index: 2;
        }

        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 20px;
            margin-bottom: 16px;
            overflow: visible;
        }

        .amount-section {
            text-align: center;
            padding: 24px 0;
        }

        .amount-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .amount-display {
            font-size: 48px;
            font-weight: 700;
            color: var(--text-primary);
            font-variant-numeric: tabular-nums;
        }

        .amount-display .currency {
            font-size: 24px;
            color: var(--text-secondary);
            margin-right: 4px;
        }

        .category-section {
            margin: 20px 0;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .category-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 16px 8px;
            background: var(--bg-main);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }

        .category-item:hover {
            background: #EEF2F7;
            transform: translateY(-2px);
        }

        .category-item.active {
            background: linear-gradient(135deg, rgba(74, 144, 226, 0.1) 0%, rgba(108, 99, 255, 0.1) 100%);
            border-color: var(--primary);
        }

        .category-item .emoji {
            font-size: 28px;
            line-height: 1;
        }

        .category-item .name {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
        }

        .category-item.active .name {
            color: var(--primary);
            font-weight: 600;
        }

        .note-section {
            margin: 20px 0;
        }

        .note-input {
            width: 100%;
            padding: 14px 16px;
            font-size: 15px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-main);
            color: var(--text-primary);
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .note-input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
        }

        .note-input::placeholder {
            color: var(--text-light);
        }

        .numpad-section {
            margin: 20px 0;
        }

        .numpad-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .numpad-btn {
            height: 56px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 24px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            background: var(--bg-card);
            color: var(--text-primary);
            box-shadow: var(--shadow);
        }

        .numpad-btn:hover {
            transform: scale(1.02);
            box-shadow: var(--shadow-hover);
        }

        .numpad-btn:active {
            transform: scale(0.98);
        }

        .numpad-btn.delete {
            background: #FFF3E0;
            color: #FF9800;
            font-size: 20px;
        }

        .numpad-btn.clear {
            background: #FFEBEE;
            color: var(--danger);
        }

        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            padding: 16px 24px;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(74, 144, 226, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 144, 226, 0.5);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-danger {
            background: var(--bg-card);
            color: var(--danger);
            border: 2px solid var(--danger);
        }

        .btn-danger:hover {
            background: #FFEBEE;
        }

        .stat-summary {
            text-align: center;
            padding: 32px 20px;
            background: linear-gradient(135deg, var(--primary) 0%, #6C63FF 100%);
            border-radius: var(--radius);
            color: white;
            margin-bottom: 20px;
        }

        .stat-summary .label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .stat-summary .amount {
            font-size: 36px;
            font-weight: 700;
        }

        .stat-summary .count {
            font-size: 14px;
            opacity: 0.8;
            margin-top: 8px;
        }

        .chart-container {
            position: relative;
            width: 220px;
            height: 220px;
            margin: 10px auto;
            padding: 10px;
        }

        .chart-container svg {
            display: block;
            width: 200px;
            height: 200px;
            margin: 0 auto;
        }

        .chart-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .chart-center .total-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .chart-center .total-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .category-list {
            margin-top: 24px;
        }

        .category-list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
        }

        .category-list-item:last-child {
            border-bottom: none;
        }

        .category-list-item .emoji {
            font-size: 32px;
            width: 48px;
            text-align: center;
        }

        .category-list-item .info {
            flex: 1;
        }

        .category-list-item .name {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .category-list-item .bar-container {
            height: 8px;
            background: var(--bg-main);
            border-radius: 4px;
            overflow: hidden;
        }

        .category-list-item .bar {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .category-list-item .stats {
            text-align: right;
            min-width: 80px;
        }

        .category-list-item .amount {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .category-list-item .percentage {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .filter-section {
            margin-bottom: 16px;
        }

        .filter-select {
            width: 100%;
            padding: 12px 16px;
            font-size: 14px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg-card);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .history-list {
            margin-top: 16px;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px;
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            transition: all 0.2s ease;
            position: relative;
        }

        .history-item:hover {
            transform: translateX(4px);
            box-shadow: var(--shadow-hover);
        }

        .history-item .emoji {
            font-size: 36px;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-main);
            border-radius: 12px;
        }

        .history-item .info {
            flex: 1;
        }

        .history-item .category-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .history-item .note {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .history-item .time {
            font-size: 12px;
            color: var(--text-light);
        }

        .history-item .amount {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .history-item .amount::before {
            content: '¥';
            font-size: 14px;
            margin-right: 2px;
        }

        .history-item .delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 28px;
            height: 28px;
            border: none;
            background: #FFEBEE;
            color: var(--danger);
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            opacity: 0;
            transition: opacity 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .history-item:hover .delete-btn {
            opacity: 1;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state .emoji {
            font-size: 80px;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            font-size: 18px;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: var(--text-primary);
            color: white;
            padding: 14px 28px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 430px;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            z-index: 100;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 20px;
            border: none;
            background: none;
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: var(--radius-sm);
        }

        .nav-item:hover {
            background: var(--bg-main);
        }

        .nav-item .icon {
            font-size: 24px;
        }

        .nav-item .label {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .nav-item.active .label {
            color: var(--primary);
            font-weight: 600;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 24px;
            width: 90%;
            max-width: 320px;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .modal-overlay.show .modal {
            transform: scale(1);
        }

        .modal h3 {
            font-size: 18px;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .modal p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .modal-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .modal-buttons .btn {
            padding: 12px;
        }

        .page {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 430px) {
            .app-container {
                max-width: 100%;
            }

            .bottom-nav {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <h1>💰 每日记账</h1>
            <p>管理你的每一笔支出</p>
        </div>

        <div class="page-content">
            <div id="page-add" class="page active">
                <div class="card">
                    <div class="amount-section">
                        <div class="amount-label">本次消费金额</div>
                        <div class="amount-display">
                            <span class="currency">¥</span>
                            <span id="amount-value">0</span>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="category-section">
                        <div class="section-title">📂 选择分类</div>
                        <div class="category-grid">
                            <div class="category-item active" data-category="food">
                                <span class="emoji">🍜</span>
                                <span class="name">餐饮</span>
                            </div>
                            <div class="category-item" data-category="transport">
                                <span class="emoji">🚌</span>
                                <span class="name">交通</span>
                            </div>
                            <div class="category-item" data-category="shopping">
                                <span class="emoji">🛒</span>
                                <span class="name">购物</span>
                            </div>
                            <div class="category-item" data-category="entertainment">
                                <span class="emoji">🎬</span>
                                <span class="name">娱乐</span>
                            </div>
                            <div class="category-item" data-category="health">
                                <span class="emoji">💊</span>
                                <span class="name">医疗</span>
                            </div>
                            <div class="category-item" data-category="communication">
                                <span class="emoji">📱</span>
                                <span class="name">通讯</span>
                            </div>
                            <div class="category-item" data-category="housing">
                                <span class="emoji">🏠</span>
                                <span class="name">居住</span>
                            </div>
                            <div class="category-item" data-category="other">
                                <span class="emoji">✨</span>
                                <span class="name">其他</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="note-section">
                        <div class="section-title">📝 添加备注</div>
                        <input type="text" class="note-input" id="note-input" placeholder="写点什么记录一下..." maxlength="100">
                    </div>

                    <div class="numpad-section">
                        <div class="section-title">🔢 输入金额</div>
                        <div class="numpad-grid">
                            <button class="numpad-btn" data-value="1">1</button>
                            <button class="numpad-btn" data-value="2">2</button>
                            <button class="numpad-btn" data-value="3">3</button>
                            <button class="numpad-btn" data-value="4">4</button>
                            <button class="numpad-btn" data-value="5">5</button>
                            <button class="numpad-btn" data-value="6">6</button>
                            <button class="numpad-btn" data-value="7">7</button>
                            <button class="numpad-btn" data-value="8">8</button>
                            <button class="numpad-btn" data-value="9">9</button>
                            <button class="numpad-btn" data-value=".">.</button>
                            <button class="numpad-btn" data-value="0">0</button>
                            <button class="numpad-btn delete" data-action="delete">⌫</button>
                        </div>
                    </div>

                    <div class="action-buttons">
                        <button class="btn btn-danger" id="clear-btn">
                            🗑️ 清除
                        </button>
                        <button class="btn btn-primary" id="save-btn">
                            ✅ 保存
                        </button>
                    </div>
                </div>
            </div>

            <div id="page-statistics" class="page">
                <div class="card">
                    <div class="stat-summary">
                        <div class="label">本月总支出</div>
                        <div class="amount" id="total-amount">¥0.00</div>
                        <div class="count" id="expense-count">共 0 笔消费</div>
                    </div>
                </div>

                <div class="card">
                    <div class="section-title">📊 消费占比</div>
                    <div class="chart-container">
                        <svg id="pie-chart" viewBox="0 0 200 200">
                        </svg>
                        <div class="chart-center">
                            <div class="total-label">总支出</div>
                            <div class="total-value" id="chart-total">¥0</div>
                        </div>
                    </div>

                    <div class="category-list" id="category-statistics">
                    </div>
                </div>
            </div>

            <div id="page-history" class="page">
                <div class="card">
                    <div class="filter-section">
                        <div class="section-title">🔍 筛选记录</div>
                        <select class="filter-select" id="filter-category">
                            <option value="all">全部分类</option>
                            <option value="food">🍜 餐饮</option>
                            <option value="transport">🚌 交通</option>
                            <option value="shopping">🛒 购物</option>
                            <option value="entertainment">🎬 娱乐</option>
                            <option value="health">💊 医疗</option>
                            <option value="communication">📱 通讯</option>
                            <option value="housing">🏠 居住</option>
                            <option value="other">✨ 其他</option>
                        </select>
                    </div>

                    <div class="history-list" id="history-list">
                    </div>
                </div>
            </div>
        </div>

        <nav class="bottom-nav">
            <button class="nav-item active" data-page="page-add">
                <span class="icon">✏️</span>
                <span class="label">记账</span>
            </button>
            <button class="nav-item" data-page="page-statistics">
                <span class="icon">📊</span>
                <span class="label">统计</span>
            </button>
            <button class="nav-item" data-page="page-history">
                <span class="icon">📝</span>
                <span class="label">记录</span>
            </button>
        </nav>

        <div class="toast" id="toast"></div>

        <div class="modal-overlay" id="modal-overlay">
            <div class="modal">
                <h3>⚠️ 确认删除</h3>
                <p>确定要删除这条消费记录吗？此操作无法撤销。</p>
                <div class="modal-buttons">
                    <button class="btn btn-danger" id="modal-cancel">取消</button>
                    <button class="btn btn-primary" id="modal-confirm">确认</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CATEGORIES = {
            food: { emoji: '🍜', name: '餐饮', color: '#FF6B6B' },
            transport: { emoji: '🚌', name: '交通', color: '#4ECDC4' },
            shopping: { emoji: '🛒', name: '购物', color: '#FFE66D' },
            entertainment: { emoji: '🎬', name: '娱乐', color: '#95E1D3' },
            health: { emoji: '💊', name: '医疗', color: '#F38181' },
            communication: { emoji: '📱', name: '通讯', color: '#AA96DA' },
            housing: { emoji: '🏠', name: '居住', color: '#FCBAD3' },
            other: { emoji: '✨', name: '其他', color: '#B8B8B8' }
        };

        let currentAmount = '0';
        let selectedCategory = 'food';
        let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
        let deleteTargetId = null;

        const amountValue = document.getElementById('amount-value');
        const noteInput = document.getElementById('note-input');
        const categoryItems = document.querySelectorAll('.category-item');
        const numpadBtns = document.querySelectorAll('.numpad-btn');
        const clearBtn = document.getElementById('clear-btn');
        const saveBtn = document.getElementById('save-btn');
        const navItems = document.querySelectorAll('.nav-item');
        const pages = document.querySelectorAll('.page');
        const toast = document.getElementById('toast');
        const modalOverlay = document.getElementById('modal-overlay');
        const modalCancel = document.getElementById('modal-cancel');
        const modalConfirm = document.getElementById('modal-confirm');
        const filterCategory = document.getElementById('filter-category');
        const historyList = document.getElementById('history-list');
        const categoryStatistics = document.getElementById('category-statistics');

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        function updateAmountDisplay() {
            amountValue.textContent = currentAmount;
        }

        function handleNumpadClick(value) {
            if (value === 'delete') {
                if (currentAmount.length > 1) {
                    currentAmount = currentAmount.slice(0, -1);
                } else {
                    currentAmount = '0';
                }
            } else {
                if (currentAmount === '0' && value !== '.') {
                    currentAmount = value;
                } else {
                    if (value === '.' && currentAmount.includes('.')) return;
                    const parts = currentAmount.split('.');
                    if (parts[1] && parts[1].length >= 2) return;
                    if (currentAmount.length >= 10) return;
                    currentAmount += value;
                }
            }
            updateAmountDisplay();
        }

        function handleCategoryClick(category) {
            selectedCategory = category;
            categoryItems.forEach(item => {
                item.classList.toggle('active', item.dataset.category === category);
            });
        }

        function clearForm() {
            currentAmount = '0';
            selectedCategory = 'food';
            noteInput.value = '';
            updateAmountDisplay();
            handleCategoryClick('food');
            showToast('✨ 已清除所有内容');
        }

        function saveExpense() {
            const amount = parseFloat(currentAmount);
            if (amount <= 0) {
                showToast('⚠️ 请输入正确的金额');
                return;
            }

            const expense = {
                id: Date.now().toString(),
                amount: amount,
                category: selectedCategory,
                note: noteInput.value.trim(),
                timestamp: Date.now()
            };

            expenses.unshift(expense);
            localStorage.setItem('expenses', JSON.stringify(expenses));

            showToast('✅ 记账成功！');
            clearForm();

            if (document.getElementById('page-statistics').classList.contains('active')) {
                renderStatistics();
            }
        }

        function formatDate(timestamp) {
            const date = new Date(timestamp);
            const now = new Date();
            const diff = now - date;
            const oneDay = 24 * 60 * 60 * 1000;

            if (diff < oneDay && date.getDate() === now.getDate()) {
                return '今天 ' + date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            } else if (diff < 2 * oneDay && date.getDate() === now.getDate() - 1) {
                return '昨天 ' + date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            } else {
                return date.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            }
        }

        function renderHistory(filter = 'all') {
            const filtered = filter === 'all'
                ? expenses
                : expenses.filter(e => e.category === filter);

            if (filtered.length === 0) {
                historyList.innerHTML = `
                    <div class="empty-state">
                        <div class="emoji">📭</div>
                        <h3>还没有消费记录</h3>
                        <p>快去记下你的第一笔支出吧！</p>
                    </div>
                `;
                return;
            }

            historyList.innerHTML = filtered.map(expense => {
                const cat = CATEGORIES[expense.category];
                return `
                    <div class="history-item">
                        <div class="emoji">${cat.emoji}</div>
                        <div class="info">
                            <div class="category-name">${cat.name}</div>
                            ${expense.note ? `<div class="note">${expense.note}</div>` : ''}
                            <div class="time">${formatDate(expense.timestamp)}</div>
                        </div>
                        <div class="amount">${expense.amount.toFixed(2)}</div>
                        <button class="delete-btn" data-id="${expense.id}">×</button>
                    </div>
                `;
            }).join('');

            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteTargetId = btn.dataset.id;
                    modalOverlay.classList.add('show');
                });
            });
        }

        function calculateStatistics() {
            const stats = {};
            let total = 0;

            expenses.forEach(expense => {
                if (!stats[expense.category]) {
                    stats[expense.category] = {
                        amount: 0,
                        count: 0
                    };
                }
                stats[expense.category].amount += expense.amount;
                stats[expense.category].count += 1;
                total += expense.amount;
            });

            return { stats, total };
        }

        function renderStatistics() {
            const { stats, total } = calculateStatistics();

            document.getElementById('total-amount').textContent = `¥${total.toFixed(2)}`;
            document.getElementById('chart-total').textContent = `¥${Math.round(total)}`;
            document.getElementById('expense-count').textContent = `共 ${expenses.length} 笔消费`;

            const sortedCategories = Object.entries(stats)
                .map(([key, value]) => ({
                    category: key,
                    ...value,
                    percentage: total > 0 ? (value.amount / total * 100) : 0
                }))
                .sort((a, b) => b.amount - a.amount);

            if (sortedCategories.length === 0) {
                categoryStatistics.innerHTML = `
                    <div class="empty-state">
                        <div class="emoji">📊</div>
                        <h3>暂无统计数据</h3>
                        <p>记录你的第一笔消费后，这里会显示统计信息</p>
                    </div>
                `;
            } else {
                categoryStatistics.innerHTML = sortedCategories.map(item => {
                    const cat = CATEGORIES[item.category];
                    return `
                        <div class="category-list-item">
                            <div class="emoji">${cat.emoji}</div>
                            <div class="info">
                                <div class="name">${cat.name}</div>
                                <div class="bar-container">
                                    <div class="bar" style="width: ${item.percentage}%; background: ${cat.color}"></div>
                                </div>
                            </div>
                            <div class="stats">
                                <div class="amount">¥${item.amount.toFixed(2)}</div>
                                <div class="percentage">${item.percentage.toFixed(1)}%</div>
                            </div>
                        </div>
                    `;
                }).join('');
            }

            renderPieChart(stats, total);
        }

        function renderPieChart(stats, total) {
            const svg = document.getElementById('pie-chart');
            
            svg.innerHTML = '';
            
            const centerX = 100;
            const centerY = 100;
            const radius = 70;
            const holeRadius = 40;
            
            if (total === 0) {
                svg.innerHTML = `
                    <circle cx="${centerX}" cy="${centerY}" r="${radius}" fill="#E8EAED"/>
                    <circle cx="${centerX}" cy="${centerY}" r="${holeRadius}" fill="#FFFFFF"/>
                `;
                return;
            }
            
            const entries = Object.entries(stats);
            let currentAngle = -Math.PI / 2;
            
            entries.forEach(([key, value]) => {
                const cat = CATEGORIES[key];
                const percentage = value.amount / total;
                const segmentAngle = percentage * Math.PI * 2;
                const endAngle = currentAngle + segmentAngle;
                
                const x1 = centerX + radius * Math.cos(currentAngle);
                const y1 = centerY + radius * Math.sin(currentAngle);
                const x2 = centerX + radius * Math.cos(endAngle);
                const y2 = centerY + radius * Math.sin(endAngle);
                
                const largeArc = percentage > 0.5 ? 1 : 0;
                
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                const d = `M ${centerX} ${centerY} L ${x1} ${y1} A ${radius} ${radius} 0 ${largeArc} 1 ${x2} ${y2} Z`;
                path.setAttribute('d', d);
                path.setAttribute('fill', cat.color);
                svg.appendChild(path);
                
                currentAngle = endAngle;
            });
            
            const hole = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            hole.setAttribute('cx', centerX.toString());
            hole.setAttribute('cy', centerY.toString());
            hole.setAttribute('r', holeRadius.toString());
            hole.setAttribute('fill', '#FFFFFF');
            svg.appendChild(hole);
        }

        function handleNavigation(pageId) {
            navItems.forEach(item => {
                item.classList.toggle('active', item.dataset.page === pageId);
            });

            pages.forEach(page => {
                page.classList.toggle('active', page.id === pageId);
            });

            if (pageId === 'page-statistics') {
                renderStatistics();
            } else if (pageId === 'page-history') {
                renderHistory(filterCategory.value);
            }
        }

        function deleteExpense(id) {
            expenses = expenses.filter(e => e.id !== id);
            localStorage.setItem('expenses', JSON.stringify(expenses));
            showToast('🗑️ 已删除记录');
            renderHistory(filterCategory.value);
            renderStatistics();
        }

        numpadBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                if (btn.dataset.value) {
                    handleNumpadClick(btn.dataset.value);
                } else if (btn.dataset.action) {
                    handleNumpadClick(btn.dataset.action);
                }
            });
        });

        categoryItems.forEach(item => {
            item.addEventListener('click', () => {
                handleCategoryClick(item.dataset.category);
            });
        });

        clearBtn.addEventListener('click', clearForm);
        saveBtn.addEventListener('click', saveExpense);

        navItems.forEach(item => {
            item.addEventListener('click', () => {
                handleNavigation(item.dataset.page);
            });
        });

        filterCategory.addEventListener('change', (e) => {
            renderHistory(e.target.value);
        });

        modalCancel.addEventListener('click', () => {
            modalOverlay.classList.remove('show');
            deleteTargetId = null;
        });

        modalConfirm.addEventListener('click', () => {
            if (deleteTargetId) {
                deleteExpense(deleteTargetId);
                deleteTargetId = null;
            }
            modalOverlay.classList.remove('show');
        });

        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) {
                modalOverlay.classList.remove('show');
                deleteTargetId = null;
            }
        });

        renderStatistics();
        renderHistory();
    </script>
</body>
</html>
